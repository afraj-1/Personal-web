<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tech Blog — Afra Juwairiya</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #7c3aed; --accent-light: #a78bfa; --bg: #0a0a0a; --white: #fff; --border: rgba(255,255,255,0.07); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--white); -webkit-font-smoothing: antialiased; }

    .site-header { position: sticky; top: 0; z-index: 100; border-bottom: 0.5px solid var(--border); background: rgba(10,10,10,0.88); backdrop-filter: blur(14px); }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 1.25rem 2.5rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-size: 1.1rem; font-weight: 500; color: var(--white); text-decoration: none; letter-spacing: -0.5px; }
    .nav-logo span { color: var(--accent-light); }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta { background: var(--accent) !important; color: var(--white) !important; padding: 7px 18px; border-radius: 100px; text-transform: none !important; letter-spacing: 0 !important; font-size: 0.8rem !important; }

    .page { max-width: 720px; margin: 0 auto; padding: 6rem 2.5rem 6rem; text-align: center; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.25); text-decoration: none; margin-bottom: 4rem; transition: color 0.2s; }
    .back-link:hover { color: var(--accent-light); }

    .eyebrow { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent-light); margin-bottom: 1.25rem; }

    .heading { font-family: 'DM Serif Display', serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 400; line-height: 1; letter-spacing: -2px; color: var(--white); margin-bottom: 1.5rem; }
    .heading em { font-style: italic; color: var(--accent-light); display: block; }

    .body-text { font-size: 0.95rem; color: rgba(255,255,255,0.4); line-height: 1.9; max-width: 460px; margin: 0 auto 3rem; }

    .tag { display: inline-block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; background: rgba(124,58,237,0.12); color: rgba(167,139,250,0.7); padding: 6px 16px; border-radius: 100px; border: 0.5px solid rgba(167,139,250,0.2); }

    .site-footer { border-top: 0.5px solid var(--border); padding: 2rem 2.5rem; }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .footer-left { font-size: 0.72rem; color: rgba(255,255,255,0.2); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-size: 0.72rem; color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent-light); }

    @media (max-width: 640px) { .page { padding: 4rem 1.5rem; } .nav-links a:not(.nav-cta) { display: none; } .footer-inner { flex-direction: column; gap: 1rem; } }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">Af<span>ra</span></a>
      <nav class="nav-links">
        <a href="index.html#work">Work</a>
        <a href="poems.html">Poems</a>
        <a href="about.html">About</a>
        <a href="index.html#contact" class="nav-cta">Let's talk →</a>
      </nav>
    </div>
  </header>

  <div class="page">
    <a href="index.html" class="back-link">← Back home</a>
    <div class="eyebrow">Tech Blog</div>
    <h1 class="heading">Writing things<br><em>I actually know.</em></h1>
    <p class="body-text">Data pipelines, analytics, building things from scratch — the stuff I've figured out the hard way. Coming soon. Check back or find me on LinkedIn for now.</p>
    <span class="tag">Coming soon</span>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-left">Afra Juwairiya · © <span id="year"></span></span>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="https://github.com/afraj-1" target="_blank" rel="noopener">GitHub</a>
        <a href="mailto:afrajuwairiya@gmail.com">Email</a>
      </div>
    </div>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
